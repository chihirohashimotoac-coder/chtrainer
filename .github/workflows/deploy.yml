name: Build, Test and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type check & build
        run: npm run build
      - name: Run tests
        run: npm test
      - name: Install browser for visual QA
        if: github.event_name == 'pull_request'
        run: |
          python -m pip install playwright==1.55.0
          python -m playwright install --with-deps chromium
      - name: Capture responsive visual QA
        if: github.event_name == 'pull_request'
        run: |
          npm run preview -- --host 127.0.0.1 > /tmp/chtrainer-preview.log 2>&1 &
          python scripts/visual_qa.py
      - name: Upload visual QA screenshots
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: visual-qa-screenshots
          path: qa-screenshots
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build-test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
